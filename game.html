<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caucasus Trivia Challenge</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    transition: background-image 0.8s ease-in-out;
}
.subheader {
    text-align: center;
    margin-bottom: 20px;
    font-size: 16px;
    background-color: #D90012;
}

.subheader a {
    color: #001489;
    text-decoration: none;
    font-weight: bold;
}

.subheader a:hover {
    text-decoration: underline;
}
#game-container {
    max-width: 700px;
    margin: auto;
    background: #F2A800;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

h1 {
    color: #333;
}

#difficulty {
    font-weight: bold;
    margin: 10px 0;
}

#question {
    font-size: 22px;
    margin: 20px 0;
}

.answer-btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
}

#feedback {
    font-size: 24px;
    font-weight: bold;
    height: 30px;
    margin: 15px 0;
}

#score {
    margin-top: 15px;
    font-weight: bold;
}

#result {
    margin-top: 20px;
}
</style>

</head>
<body>
<h4 class="subheader">
    <a href="index.html" id="top">Resume (Bootstrap Webpages)</a> |
    <a href="#">Game</a> |
    <a href="scratch.html">Scratch Page</a> |
    <a href="scratch_styles.css">CSS for Scratch Page</a> |
    <a href="bootstrap_styles.css">Custom CSS for Bootstrap Webpages</a>
</h4>

<div id="game-container">

    <h1>Caucasus Trivia Challenge</h1>

    <div id="question-counter"></div>

    <div id="difficulty"></div>

    <div id="question"></div>

    <div id="feedback"></div>

    <div id="answers"></div>

    <div id="score"></div>

    <div id="result"></div>

</div>

<script>
const backgrounds = [
    "Images/Dilijan.jpg",
    "Images/Zvartnots_Cathedral.jpg",
    "Images/Lake_Sevan.jpg",
    "Images/Baku.jpg",
    "Images/CandycaneMtns.jpg",
    "Images/Aliyev_Center.jpg",
    "Images/Georgia_Mtns.jpg",
    "Images/Svaneti.jpg",
    "Images/Tbilisi.jpg",
];

let currentBackground = 0;

const questions = {

easy: [
    // ===== ARMENIA =====
    { id: 1, question: "What is the capital city of Armenia?", answers: ["Tbilisi","Yerevan","Baku","Gyumri"], correct: 1 },
    { id: 2, question: "On which continent is Armenia located?", answers: ["Africa","South America","Asia","Australia"], correct: 2 },
    { id: 3, question: "What are the colors of the Armenian flag?", answers: ["Red, Blue, Orange","Red, White, Green","Blue, Yellow, Red","Black, Red, Gold"], correct: 0 },
    { id: 4, question: "What is the official language of Armenia?", answers: ["Russian","Turkish","Armenian","Persian"], correct: 2 },
    { id: 5, question: "Which mountain is a national symbol of Armenia?", answers: ["Mount Everest","Mount Ararat","Mount Elbrus","Mount Kazbek"], correct: 1 },

    // ===== AZERBAIJAN =====
    { id: 6, question: "What is the capital city of Azerbaijan?", answers: ["Ganja","Baku","Sumqayit","Shaki"], correct: 1 },
    { id: 7, question: "On which continent is Azerbaijan located?", answers: ["Africa","South America","Asia","Australia"], correct: 2 },
    { id: 8, question: "What are the colors of the Azerbaijani flag?", answers: ["Red, Blue, Orange","Blue, Red, Green","Red, White, Green","Black, Red, Gold"], correct: 1 },
    { id: 9, question: "What is the official language of Azerbaijan?", answers: ["Russian","Turkish","Azerbaijani","Persian"], correct: 2 },
    { id: 10, question: "Which mountain is a national symbol of Azerbaijan?", answers: ["Mount Everest","Mount Ararat","Mount Shahdagh","Mount Kazbek"], correct: 2 },

    // ===== GEORGIA =====
    { id: 11, question: "What is the capital city of Georgia?", answers: ["Batumi","Kutaisi","Tbilisi","Rustavi"], correct: 2 },
    { id: 12, question: "On which continent is Georgia located?", answers: ["Africa","South America","Europe/Asia (Caucasus region)","Australia"], correct: 2 },
    { id: 13, question: "What are the colors of the Georgian flag?", answers: ["Red and White","Blue and Yellow","Green and White","Red, Blue, Orange"], correct: 0 },
    { id: 14, question: "What is the official language of Georgia?", answers: ["Armenian","Georgian","Russian","Turkish"], correct: 1 },
    { id: 15, question: "Which sea lies to the west of Georgia?", answers: ["Caspian Sea","Black Sea","Aral Sea","Mediterranean Sea"], correct: 1 }
],

medium: [
    // ===== ARMENIA =====
    { id: 16, question: "Armenia became the first country to adopt Christianity in which year?", answers: ["1054","301","476","1453"], correct: 1 },
    { id: 17, question: "Which alphabet was created for Armenian?", answers: ["Greek","Cyrillic","Armenian Alphabet","Latin"], correct: 2 },
    { id: 18, question: "Which country is west of Armenia?", answers: ["Azerbaijan","Georgia","Iran","Turkey"], correct: 3 },
    { id: 19, question: "What is Armenia’s second-largest city?", answers: ["Vanadzor","Goris","Gyumri","Dilijan"], correct: 2 },
    { id: 20, question: "What lake is in Armenia?", answers: ["Lake Van","Lake Urmia","Lake Sevan","Lake Balkhash"], correct: 2 },

    // ===== AZERBAIJAN =====
    { id: 21, question: "Azerbaijan became independent from the USSR in which year?", answers: ["1985","1991","1995","2001"], correct: 1 },
    { id: 22, question: "Which script is used today in Azerbaijan?", answers: ["Greek","Cyrillic","Arabic","Latin"], correct: 3 },
    { id: 23, question: "Which country is south of Azerbaijan?", answers: ["Georgia","Russia","Iran","Armenia"], correct: 2 },
    { id: 24, question: "What is Azerbaijan’s second-largest city?", answers: ["Ganja","Lankaran","Shaki","Mingachevir"], correct: 0 },
    { id: 25, question: "Which sea borders Azerbaijan?", answers: ["Black Sea","Aral Sea","Caspian Sea","Mediterranean Sea"], correct: 2 },

    // ===== GEORGIA =====
    { id: 26, question: "Georgia became independent from USSR in which year?", answers: ["1989","1991","1993","1995"], correct: 1 },
    { id: 27, question: "What script does Georgia use?", answers: ["Latin","Cyrillic","Georgian script","Arabic"], correct: 2 },
    { id: 28, question: "Which country is south of Georgia?", answers: ["Russia","Turkey","Ukraine","Kazakhstan"], correct: 1 },
    { id: 29, question: "What is Georgia’s second-largest city?", answers: ["Batumi","Kutaisi","Gori","Zugdidi"], correct: 1 },
    { id: 30, question: "Which mountain range is in Georgia?", answers: ["Alps","Andes","Himalayas","Caucasus Mountains"], correct: 3 }
],

hard: [
    // ===== ARMENIA =====
    { id: 31, question: "Who created the Armenian alphabet?", answers: ["Grigor Lusavorich","Mesrop Mashtots","Movses Khorenatsi","Tigranes"], correct: 1 },
    { id: 32, question: "Greatest Armenian king?", answers: ["Artashes I","Tiridates III","Tigranes the Great","Ashot I"], correct: 2 },
    { id: 33, question: "Armenian Genocide happened during which war?", answers: ["Crimean War","Russo-Turkish War","World War I","World War II"], correct: 2 },
    { id: 34, question: "UNESCO monastery carved into rock?", answers: ["Tatev","Haghpat","Geghard","Noravank"], correct: 2 },
    { id: 35, question: "Armenia is in which economic bloc?", answers: ["EU","GCC","Eurasian Economic Union","Mercosur"], correct: 2 },

    // ===== AZERBAIJAN =====
    { id: 36, question: "Who modernized Azerbaijani language?", answers: ["Akhundov","Nizami","Rasulzade","Hajibeyov"], correct: 0 },
    { id: 37, question: "Who led Azerbaijan in 1918 independence?", answers: ["Heydar Aliyev","Elchibey","Rasulzade","Ilham Aliyev"], correct: 2 },
    { id: 38, question: "Azerbaijan independence period?", answers: ["Pre WWI","WWI era","WWII era","Cold War"], correct: 1 },
    { id: 39, question: "Famous UNESCO site in Azerbaijan?", answers: ["Gobustan","Sheki Palace","Maiden Tower","Walled Baku"], correct: 3 },
    { id: 40, question: "Turkic cooperation organization?", answers: ["EU","Arab League","Organization of Turkic States","ASEAN"], correct: 2 },

    // ===== GEORGIA =====
    { id: 41, question: "Famous Georgian queen?", answers: ["Tamar the Great","Catherine","Elizabeth I","Maria Theresa"], correct: 0 },
    { id: 42, question: "Important Georgian king?", answers: ["David IV","Vakhtang I","George V","Solomon I"], correct: 0 },
    { id: 43, question: "Georgia independence followed collapse of?", answers: ["Russian Empire","Ottoman Empire","Soviet Union","Byzantine Empire"], correct: 2 },
    { id: 44, question: "Famous cave city?", answers: ["Uplistsikhe","Vardzia","Mtskheta","Telavi"], correct: 1 },
    { id: 45, question: "EU partnership program?", answers: ["EAEU","Warsaw Pact","Eastern Partnership","Schengen"], correct: 2 }
]

};


let score = 0;
let questionNumber = 0;
let currentDifficulty = "easy";
let usedQuestions = new Set();

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const resultEl = document.getElementById("result");
const feedbackEl = document.getElementById("feedback");
const scoreEl = document.getElementById("score");
const counterEl = document.getElementById("question-counter");
const difficultyEl = document.getElementById("difficulty");

function getQuestion() {

    const available = questions[currentDifficulty].filter(
        q => !usedQuestions.has(q.id)
    );

    let selected;

    if (available.length > 0) {
        selected =
            available[Math.floor(Math.random() * available.length)];
        usedQuestions.add(selected.id);
    } else {
        selected =
            questions[currentDifficulty][
                Math.floor(Math.random() * questions[currentDifficulty].length)
            ];
    }

    return selected;
}


document.body.style.backgroundImage =
    `url('${backgrounds[0]}')`;

document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";


function loadQuestion() {

    if (questionNumber >= 5) {
        endGame();
        return;
    }

    const currentQuestion = getQuestion();

    counterEl.textContent =
        `Question ${questionNumber + 1} of 5`;

    difficultyEl.textContent =
        `Difficulty: ${currentDifficulty.toUpperCase()}`;

    scoreEl.textContent =
        `Current Score: ${score}`;

    questionEl.textContent =
        currentQuestion.question;

    answersEl.innerHTML = "";

    currentQuestion.answers.forEach((answer, index) => {

    const button = document.createElement("button");

    button.textContent = answer;

    button.className = "answer-btn";

    button.onclick = function() {

        const correct =
            index === currentQuestion.correct;

        if (correct) {
            score++;
            feedbackEl.textContent = "Correct!";
            feedbackEl.style.color = "green";
        } else {
            feedbackEl.textContent = "Incorrect!";
            feedbackEl.style.color = "red";
        }

        changeBackground();

        updateDifficulty(correct);

        questionNumber++;

        setTimeout(() => {

            feedbackEl.textContent = "";

            loadQuestion();

        }, 1000);
    };

    answersEl.appendChild(button);
});
}

function changeBackground() {

    currentBackground++;

    if (currentBackground >= backgrounds.length) {
        currentBackground = 0;
    }

    document.body.style.backgroundImage =
        `url('${backgrounds[currentBackground]}')`;
}
function updateDifficulty(correct) {

    if (currentDifficulty === "easy") {

        currentDifficulty =
            correct ? "medium" : "easy";

    } else if (currentDifficulty === "medium") {

        currentDifficulty =
            correct ? "hard" : "easy";

    } else {

        currentDifficulty =
            correct ? "hard" : "medium";
    }
}

function endGame() {

    questionEl.textContent =
        "Round Complete!";

    answersEl.innerHTML = "";

    difficultyEl.textContent = "";

    scoreEl.textContent = "";

    resultEl.innerHTML = `
        <h2>Your Score: ${score}/5</h2>
        <button onclick="restartGame()">
            Play Again
        </button>
    `;
}

function restartGame() {

    score = 0;
    questionNumber = 0;
    currentDifficulty = "easy";

    usedQuestions = new Set();

    resultEl.innerHTML = "";

    loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
